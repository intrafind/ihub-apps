<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iHub Apps</title>
    <script type="text/javascript">
      // Pre-mount buffer for selection postMessages. The Nextcloud-side app
      // shell can post a fresh selection at any moment; without this buffer
      // the very first message — fired by a parent that mounted the iframe
      // with selection already chosen — would be dropped on the floor before
      // React mounts. We pre-filter on `kind` and cap the buffer so a hostile
      // sibling iframe can't flood `window.__ihubPendingMessages`; the bridge
      // re-checks origin + payload before accepting on replay.
      window.__ihubPendingMessages = [];
      window.__ihubMessageBuffer = function (event) {
        if (window.__ihubPendingMessages.length >= 50) return;
        var data = event && event.data;
        if (!data || data.kind !== 'ihub.nextcloud.selection') return;
        window.__ihubPendingMessages.push({ origin: event.origin, data: data });
      };
      window.addEventListener('message', window.__ihubMessageBuffer);
    </script>
  </head>
  <body style="width: 100%; height: 100%; margin: 0; padding: 0">
    <div id="ihub-embed-root"></div>
    <script type="module" src="./full-app-entry.jsx"></script>
  </body>
</html>
