name: Build mdBook Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/update-docs-version.js'
      - 'scripts/export-docs-markdown.js'
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup mdBook and Rust toolchain
        uses: ./.github/actions/setup-mdbook-rust

      # - name: Install Chromium (for PDF generation)
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y chromium-browser
      #     chromium-browser --version

      - name: Install NPM dependencies
        run: npm ci

      - name: Build all documentation formats
        run: npm run docs:build:all
        env:
          RUST_BACKTRACE: 1

      - name: Verify outputs
        run: |
          echo "=== Build Outputs ==="
          ls -lh docs/book/
          echo ""
          echo "=== HTML Output ==="
          ls -lh docs/book/html/ | head -10
          echo ""
          echo "=== PDF Output ==="
          ls -lh docs/book/pdf/ || echo "No PDF output"
          echo ""
          echo "=== Markdown Output ==="
          ls -lh docs/book/*.md || echo "No Markdown output"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/book/html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-pdf
          path: docs/book/pdf/*.pdf
        continue-on-error: true

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-markdown
          path: docs/book/iHub-Apps-Documentation.md
        continue-on-error: true
