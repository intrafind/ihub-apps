# Configuration for GitHub Auto-Labeler (actions/labeler v6 format)
# https://github.com/actions/labeler

# Frontend related changes
'frontend':
  - changed-files:
      - any-glob-to-any-file:
          - client/**/*
          - '*.html'
          - '*.css'
          - '*.js'
          - '*.jsx'
          - '*.ts'
          - '*.tsx'
          - vite.config.js
          - tailwind.config.js

# Backend related changes
'backend':
  - changed-files:
      - any-glob-to-any-file:
          - server/**/*
          - '*.cjs'
          - package.json
          - package-lock.json

# Configuration changes
'configuration':
  - changed-files:
      - any-glob-to-any-file:
          - contents/config/**/*
          - contents/apps/**/*
          - contents/models/**/*
          - contents/prompts/**/*
          - contents/sources/**/*
          - configs/**/*
          - config.env
          - .env*

# Documentation changes
'documentation':
  - changed-files:
      - any-glob-to-any-file:
          - docs/**/*
          - '*.md'
          - README.md
          - CLAUDE.md
          - concepts/**/*
          - book.toml

# Docker related changes
'docker':
  - changed-files:
      - any-glob-to-any-file:
          - docker/**/*
          - Dockerfile
          - docker-compose*.yml
          - .dockerignore

# GitHub Actions/Workflows
'github-actions':
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**/*
          - .github/**/*

# Authentication & Security
'auth':
  - changed-files:
      - any-glob-to-any-file:
          - server/middleware/**/*
          - server/utils/authorization.js
          - server/routes/auth.js
          - client/src/features/auth/**/*
          - contents/config/groups.json

# Admin features
'admin':
  - changed-files:
      - any-glob-to-any-file:
          - client/src/features/admin/**/*
          - server/routes/admin/**/*

# Chat features
'chat':
  - changed-files:
      - any-glob-to-any-file:
          - client/src/features/chat/**/*
          - server/routes/chat/**/*
          - server/adapters/**/*

# API changes
'api':
  - changed-files:
      - any-glob-to-any-file:
          - server/routes/**/*
          - server/adapters/**/*
          - openapi.yaml

# Testing
'testing':
  - changed-files:
      - any-glob-to-any-file:
          - server/tests/**/*
          - '*.test.js'
          - '*.spec.js'
          - jest.config.js

# Dependencies
'dependencies':
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - package-lock.json
          - client/package.json
          - client/package-lock.json
          - server/package.json
          - server/package-lock.json

# Tools & Utilities
'tools':
  - changed-files:
      - any-glob-to-any-file:
          - server/tools/**/*
          - scripts/**/*
          - '*.sh'

# UI/UX
'ui':
  - changed-files:
      - any-glob-to-any-file:
          - client/src/shared/components/**/*
          - contents/config/ui.json
          - contents/config/styles.json

# Localization
'i18n':
  - changed-files:
      - any-glob-to-any-file:
          - shared/i18n/**/*
          - contents/locales/**/*
          - client/src/i18n/**/*

# Bug fixes (based on file path patterns)
'bug':
  - changed-files:
      - any-glob-to-any-file:
          - '**/*fix*'
          - '**/*bug*'

# Features (based on file path patterns)
'enhancement':
  - changed-files:
      - any-glob-to-any-file:
          - '**/*feature*'
          - '**/*feat*'
          - '**/*enhance*'

# Performance improvements
'performance':
  - changed-files:
      - any-glob-to-any-file:
          - '**/*perf*'
          - '**/*performance*'
          - '**/*optimize*'

