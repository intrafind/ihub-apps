# docker-compose.prod.yml - Production Environment
#
# Single writable `contents/` volume, matching how the server actually manages
# its data (performInitialSetup seeds it on first boot, config migrations
# and admin-UI saves write into it at runtime). Named Docker volume (not a
# bind mount) so this keeps working under `docker stack deploy` / Swarm.

services:
  # Main iHub Apps Production Container
  ihub-app:
    image: ${AI_HUB_IMAGE:-ihub-apps:latest}
    container_name: ihub-app
    ports:
      - '${AI_HUB_PORT:-3000}:3000'
    volumes:
      # Entire contents/ tree, read-write: config, apps, models, prompts,
      # locales, pages, sources, data, uploads. performInitialSetup seeds
      # this from the image's bundled defaults on first boot when empty,
      # and config migrations / admin-UI saves write into it at runtime.
      - ihub-contents:/app/contents:rw
      - ihub-logs:/app/logs:rw
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WORKERS=${WORKERS:-4}
      - PORT=3000
      - HOST=0.0.0.0
      - CORS_ORIGIN=${CORS_ORIGIN:-https://yourdomain.com}
    env_file:
      # Optional: create docker/.env.production locally for secrets you don't
      # want to pass as plain environment variables. Missing on a fresh clone
      # is fine — the app also reads config from the admin UI at runtime.
      - path: .env.production
        required: false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - ihub-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  ihub-contents:
    driver: local
  ihub-logs:
    driver: local

networks:
  ihub-network:
    driver: bridge
    name: ihub-prod-network
