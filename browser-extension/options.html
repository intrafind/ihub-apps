<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iHub Apps — Settings</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body class="options-body">
    <main class="options-main">
      <h1>iHub Apps</h1>
      <p class="hint">
        Connect this extension to your iHub instance. Your administrator must enable the browser
        extension integration first.
      </p>

      <label for="base-url">iHub base URL</label>
      <input id="base-url" type="url" placeholder="https://ihub.example.com" autocomplete="url" />
      <p class="hint">Use the same URL you visit in the browser, including any subpath.</p>

      <div class="actions">
        <button id="save-btn" type="button" class="btn btn-primary">Save</button>
        <button id="signin-btn" type="button" class="btn">Sign in</button>
        <button id="signout-btn" type="button" class="btn btn-ghost">Sign out</button>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <details class="diagnostics">
        <summary>Diagnostics</summary>
        <p>
          Redirect URI for OAuth client allowlist:
          <code id="redirect-uri">…</code>
        </p>
        <p id="signed-in-state" class="hint">Checking sign-in state…</p>
      </details>
    </main>
    <script src="options.js"></script>
  </body>
</html>
